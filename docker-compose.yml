services:
  db:
    image: postgres:16-alpine
    container_name: vineflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vineflow
      POSTGRES_PASSWORD: vineflow
      POSTGRES_DB: vineflow
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - vineflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vineflow -d vineflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: vineflow-gotenberg
    restart: unless-stopped
    ports:
      - "${GOTENBERG_HOST_PORT:-3009}:3000"

volumes:
  vineflow_pgdata:
