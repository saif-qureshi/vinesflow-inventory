[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# The URL is loaded from app settings in alembic/env.py, so this is a placeholder.
sqlalchemy.url = postgresql+psycopg://vineflow:vineflow@localhost:5432/vineflow

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
